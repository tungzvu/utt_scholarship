<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu thông tin học bổng - UTT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-2xl">
    <h1 class="text-2xl font-bold text-blue-800 mb-6 text-center">TRA CỨU THÔNG TIN HỌC BỔNG</h1>
    
    <div class="flex gap-2 mb-8">
        <input type="text" id="studentId" placeholder="Nhập mã sinh viên..." 
               class="flex-1 border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="searchStudent()" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition">Tìm kiếm</button>
    </div>

    <div id="result" class="hidden space-y-4 border-t pt-6">
        </div>
    <p id="loader" class="hidden text-center text-gray-500">Đang tải dữ liệu...</p>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz-3uLqZy3fRnaCAPcw9JZjBHTPQXcrOcvTGdhfhUdgvV7p1FHqAMFvGaMFx4eemWjv/exec";
    let cachedData = null;

    async function fetchData() {
        document.getElementById('loader').classList.remove('hidden');
        const response = await fetch(API_URL);
        cachedData = await response.json();
        document.getElementById('loader').classList.add('hidden');
    }

    async function searchStudent() {
        const id = document.getElementById('studentId').value.trim();
        if (!id) return alert("Vui lòng nhập mã sinh viên");

        if (!cachedData) await fetchData();

        const student = cachedData.find(s => s["Mã SV"] === id);
        const resultDiv = document.getElementById('result');

        if (student) {
            resultDiv.classList.remove('hidden');
            // Tìm chính xác tên đã chuẩn hóa (không có xuống dòng)
            const diemHe4 = student["ĐTB HK (hệ 4)"] || "N/A";
            const loaiHB = student["Loại Học Bổng"] || "Không";
            
            resultDiv.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <p><strong>Họ tên:</strong> ${student["Họ và tên"]}</p>
                    <p><strong>Lớp:</strong> ${student["Lớp"]}</p>
                    <p><strong>ĐTB HK (hệ 4):</strong> <span class="font-bold text-blue-600">${diemHe4}</span></p>
                    <p><strong>Kết quả rèn luyện:</strong> ${student["KQPL RL"]}</p>
                    <p><strong>Học bổng:</strong> <span class="text-green-600 font-bold">${loaiHB}</span></p>
                    <p class="md:col-span-2 text-sm text-gray-600 italic border-t pt-2">
                        <strong>Ghi chú:</strong> ${student["Ghi chú (điểm hệ số 10)"] || "Không có"}
                    </p>
                </div>
            `;
        } else {
            alert("Không tìm thấy sinh viên!");
        }
    }
</script>
</body>
</html>
